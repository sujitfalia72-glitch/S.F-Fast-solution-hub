<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F Doctor Chamber Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
    linear-gradient(
    135deg,
    #2563eb,
    #4f46e5,
    #0f172a
    );
}

.bg-blur{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    filter:blur(120px);
    top:-100px;
    right:-100px;
}

.login-card{

    width:100%;
    max-width:420px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(
        255,
        255,
        255,
        .15
    );

    border-radius:28px;

    padding:35px;

    box-shadow:
    0 20px 50px rgba(
        0,
        0,
        0,
        .25
    );
}

.logo{

    width:90px;
    height:90px;

    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:22px;

    background:rgba(
        255,
        255,
        255,
        .15
    );

    color:white;

    font-size:40px;

    margin-bottom:20px;
}

.title{

    color:white;

    font-size:28px;

    font-weight:700;

    text-align:center;
}

.subtitle{

    color:rgba(
        255,
        255,
        255,
        .8
    );

    text-align:center;

    margin-top:8px;

    margin-bottom:30px;

    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

.label{

    color:white;

    display:block;

    margin-bottom:8px;

    font-size:14px;
}

.input-box{
    position:relative;
}

.input-box input{

    width:100%;

    height:55px;

    border:none;

    outline:none;

    border-radius:14px;

    padding:0 50px 0 18px;

    background:rgba(
        255,
        255,
        255,
        .10
    );

    color:white;

    font-size:15px;
}

.input-box input::placeholder{
    color:rgba(255,255,255,.6);
}

.input-box i{

    position:absolute;

    right:18px;
    top:18px;

    color:white;

    cursor:pointer;
}

.btn{

    width:100%;

    height:55px;

    border:none;

    border-radius:14px;

    background:white;

    color:#2563eb;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(
        255,
        255,
        255,
        .20
    );
}

.footer{

    margin-top:20px;

    text-align:center;

    color:rgba(
        255,
        255,
        255,
        .75
    );

    font-size:13px;
}

.footer strong{
    color:white;
}

@media(max-width:500px){

    .login-card{
        padding:25px;
    }

    .title{
        font-size:24px;
    }

}

</style>

</head>

<body>

<div class="bg-blur"></div>

<div class="login-card">

    <div class="logo">
        <i class="fa-solid fa-hospital"></i>
    </div>

    <div class="title">
        S.F Doctor Chamber
    </div>

    <div class="subtitle">
        Chamber Owner Login Panel
    </div>

    <form method="POST">
        <input type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}">

        <div class="form-group">

            <label class="label">
                Username
            </label>

            <div class="input-box">

                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required
                >

                <i class="fa-solid fa-user"></i>

            </div>

        </div>

        <div class="form-group">

            <label class="label">
                Password
            </label>

            <div class="input-box">

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >

                <i
                id="togglePass"
                class="fa-solid fa-eye"
                onclick="togglePassword()">
                </i>

            </div>

        </div>

        <button class="btn" type="submit">
            Login To Chamber
        </button>

    </form>

    <div class="footer">

        Powered By

        <strong>
            S.F Doctor Chamber
        </strong>

    </div>

</div>

<script>

function togglePassword(){

    let input =
    document.getElementById(
        "password"
    );

    let icon =
    document.getElementById(
        "togglePass"
    );

    if(input.type==="password"){

        input.type="text";

        icon.classList.remove(
            "fa-eye"
        );

        icon.classList.add(
            "fa-eye-slash"
        );

    }else{

        input.type="password";

        icon.classList.remove(
            "fa-eye-slash"
        );

        icon.classList.add(
            "fa-eye"
        );

    }
}

</script>

</body>
</html>
