<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Work</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.edit-box{
    max-width:700px;
    margin:40px auto;
    background:#111827;
    padding:25px;
    border-radius:20px;
}

.form-control{
    background:#1e293b;
    border:none;
    color:white;
}

.form-control:focus{
    background:#1e293b;
    color:white;
    box-shadow:none;
}

</style>

</head>

<body>

<div class="container">

    <div class="edit-box">

        <h2 class="mb-4">
            ✏ Edit Work
        </h2>

        <form method="POST">
            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
             >

            <div class="mb-3">

                <label class="form-label">
                    Work Title
                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ work.title }}"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4"
                    required
                >{{ work.description }}</textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Workers
                </label>

                <input
                    type="text"
                    name="workers"
                    class="form-control"
                    value="{{ work.workers }}"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Salary
                </label>

                <input
                    type="text"
                    name="salary"
                    class="form-control"
                    value="{{ work.salary }}"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Date
                </label>

                <input
                    type="date"
                    name="date"
                    class="form-control"
                    value="{{ work.date }}"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Time
                </label>

                <input
                    type="time"
                    name="time"
                    class="form-control"
                    value="{{ work.time }}"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Phone
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    value="{{ work.phone }}"
                >

            </div>

            <button class="btn btn-success">
                ✅ Update Work
            </button>

            <a href="/owner/dashboard"
               class="btn btn-secondary">

               Cancel

            </a>

        </form>

    </div>

</div>

</body>
  </html>
