<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F Works Hub - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:380px;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#1e3c72;
    margin-bottom:8px;
}

.subtitle{
    font-size:14px;
    color:#777;
    margin-bottom:25px;
}

form{
    width:100%;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fafafa;
    font-size:14px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#2a5298;
    background:#fff;
    box-shadow:0 0 0 3px rgba(42,82,152,0.1);
}

.password-wrapper{
    position:relative;
}

.password-wrapper input{
    padding-right:50px;
}

.toggle-password{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#666;
    font-size:18px;
    z-index:100;
}

button{
    width:100%;
    padding:14px;
    background:#2a5298;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:12px;
    transition:.3s;
}

button:hover{
    background:#1e3c72;
    transform:translateY(-1px);
}

.footer{
    margin-top:18px;
    font-size:13px;
    color:#666;
}

.footer a{
    color:#2a5298;
    text-decoration:none;
    font-weight:600;
}

.footer a:hover{
    text-decoration:underline;
}
    
.auth-links{
margin-top:22px;
}

.forgot-link{
display:block;
text-align:center;
text-decoration:none;
color:#2a5298;
font-size:14px;
font-weight:600;
transition:.3s;
}

.forgot-link:hover{
color:#1e3c72;
transform:translateY(-1px);
}

.divider{
margin:18px 0;
position:relative;
text-align:center;
}

.divider::before{
content:"";
position:absolute;
left:0;
top:50%;
width:100%;
height:1px;
background:#e5e7eb;
}

.divider span{
background:#fff;
padding:0 12px;
position:relative;
color:#9ca3af;
font-size:12px;
font-weight:600;
}

.signup-link{
text-align:center;
color:#6b7280;
font-size:14px;
}

.signup-link a{
color:#2a5298;
text-decoration:none;
font-weight:700;
}

.signup-link a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">🔥 S.F Works Hub</div>

    <div class="subtitle">
        Login to your account
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}">

        <input
            type="text"
            name="phone"
            placeholder="📱 Phone Number"
            required
        >

        <div class="password-wrapper">

            <input
                type="password"
                id="password"
                name="password"
                placeholder="🔒 Password"
                required
            >

            <i
                id="toggleIcon"
                class="fa-solid fa-eye toggle-password"
                onclick="togglePassword()">
            </i>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="auth-links"><a
    href="{{ url_for('auth.forgot_password') }}"
    class="forgot-link"
>
    🔑 Forgot Password?
</a>

<div class="divider">
    <span>OR</span>
</div>

<div class="signup-link">

    Don't have an account?

    <a href="{{ url_for('auth.signup') }}">
        Create Account
    </a>

</div>

    </div>
    
</div>
<script>

function togglePassword(){

    const password =
        document.getElementById("password");

    const icon =
        document.getElementById("toggleIcon");

    if(password.type === "password"){

        password.type = "text";

        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");

    }else{

        password.type = "password";

        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");

    }
}

</script>

</body>
</html>
