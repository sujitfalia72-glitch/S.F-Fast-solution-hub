<!DOCTYPE html>
<html>
<head>
    <title>Owner Transfer Control</title>

    <style>
        body{
            font-family: Arial;
            background:#eef2f7;
            margin:0;
            padding:40px;
        }

        .container{
            max-width:650px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:14px;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
            border-top:4px solid #dc3545;
        }

        h2{
            text-align:center;
            margin-bottom:10px;
            color:#222;
        }

        .sub{
            text-align:center;
            font-size:13px;
            color:gray;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            font-size:14px;
            display:block;
            margin-top:10px;
        }

        select{
            width:100%;
            padding:12px;
            margin:8px 0 15px 0;
            border:1px solid #ddd;
            border-radius:8px;
            outline:none;
            background:#fff;
        }

        .warning{
            background:#fff3cd;
            color:#856404;
            padding:10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:15px;
            border:1px solid #ffeeba;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#dc3545;
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        .btn:hover{
            background:#b02a37;
        }

        .lock{
            font-size:12px;
            color:gray;
            text-align:center;
            margin-top:12px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Owner Transfer Control</h2>
    <div class="sub">Only OWNER has full authority over this system</div>

    <div class="warning">
        ⚠ This action is irreversible. Transfer will change system control instantly.
    </div>

    <form method="POST" action="/owner/transfer" onsubmit="return confirmTransfer()">

        <!-- USER SELECT -->
        <label>Select User</label>
        <select name="user_id" required>
            {% for u in users %}
                <option value="{{ u.id }}">
                    {{ u.name }} ({{ u.role }})
                </option>
            {% endfor %}
        </select>

        <!-- CONTROLLER SELECT -->
        <label>Select New Controller (Admin / Super Admin only)</label>
        <select name="new_controller" required>
            {% for u in controllers %}
                {% if u.role in ['admin','super_admin'] %}
                    <option value="{{ u.id }}">
                        {{ u.name }} ({{ u.role }})
                    </option>
                {% endif %}
            {% endfor %}
        </select>

        <button type="submit" class="btn">
            🔁 CONFIRM TRANSFER
        </button>

    </form>

    <div class="lock">
        🔒 Access restricted to OWNER only
    </div>

</div>

<script>
function confirmTransfer(){
    return confirm("⚠ Are you absolutely sure you want to transfer control?");
}
</script>

</body>
</html>
