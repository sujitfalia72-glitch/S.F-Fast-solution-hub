<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Admin Logs • S.F Works Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#0b1220;
    color:#fff;
    font-family:Segoe UI;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

/* SEARCH */
.search-box input{
    background:#111827;
    border:1px solid #1f2937;
    color:#fff;
    padding:8px 12px;
    border-radius:10px;
    width:250px;
}

/* CARD */
.cardx{
    background:#111827;
    border:1px solid #1f2937;
    padding:15px;
    border-radius:12px;
    transition:0.2s;
}

.cardx:hover{
    transform:translateY(-2px);
    border-color:#334155;
}

/* BADGES */
.badgex{
    padding:4px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
}

.approve{background:#16a34a;}
.block{background:#dc2626;}
.unblock{background:#2563eb;}
.reject{background:#f59e0b;}

/* GRID */
.table-box{
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
}

/* SMALL TEXT */
.small{
    font-size:12px;
    color:#94a3b8;
}

/* LOADING */
.loading{
    text-align:center;
    color:#94a3b8;
    padding:20px;
}

/* EMPTY */
.empty{
    text-align:center;
    color:#94a3b8;
    padding:30px;
}

/* PAGINATION */
.pagination-box{
    display:flex;
    justify-content:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="header">
    <h4>📜 Activity Logs</h4>

    <div class="search-box">
        <input id="search" placeholder="Search action..." onkeyup="filterLogs()">
    </div>
</div>

<div id="logs" class="loading">Loading logs...</div>

<div class="pagination-box">
    <button class="btn btn-sm btn-dark" onclick="prevPage()">Prev</button>
    <span id="pageInfo" style="margin:0 10px;"></span>
    <button class="btn btn-sm btn-dark" onclick="nextPage()">Next</button>
</div>

<script>

let allLogs = [];
let currentPage = 1;
const perPage = 6;

/* ================= LOAD LOGS ================= */
async function loadLogs(){

    try{
        document.getElementById("logs").innerHTML = "Loading...";

        const res = await fetch('/super/logs?page=' + currentPage);
        const json = await res.json();

        allLogs = json.data.logs || [];

        renderLogs(allLogs);

        document.getElementById("pageInfo").innerText =
            `Page ${json.data.pagination.current} / ${json.data.pagination.pages}`;

    }catch(err){
        document.getElementById("logs").innerHTML =
        `<div class="alert alert-danger">Failed to load logs</div>`;
    }
}

/* ================= RENDER ================= */
function renderLogs(logs){

    if(!logs.length){
        document.getElementById("logs").innerHTML =
        `<div class="empty">No logs found</div>`;
        return;
    }

    let html = `<div class="table-box">`;

    logs.forEach(l => {

        let color = "approve";
        if(l.action === "block") color = "block";
        if(l.action === "unblock") color = "unblock";
        if(l.action === "reject") color = "reject";

        html += `
        <div class="cardx">

            <div style="display:flex;justify-content:space-between;">
                <b>
                    Action:
                    <span class="badgex ${color}">
                        ${l.action.toUpperCase()}
                    </span>
                </b>

                <small class="small">${l.time}</small>
            </div>

            <hr style="border-color:#1f2937">

            <div class="small">
                👤 Actor ID: ${l.actor} <br>
                🎯 Target ID: ${l.target} <br>
                🛡 Role: ${l.role}
            </div>

            <div class="small mt-2">
                🔁 ${l.meta?.old_status || '-'} → ${l.meta?.new_status || '-'}
            </div>

        </div>
        `;
    });

    html += `</div>`;
    document.getElementById("logs").innerHTML = html;
}

/* ================= SEARCH ================= */
function filterLogs(){

    let value = document.getElementById("search").value.toLowerCase();

    let filtered = allLogs.filter(l =>
        l.action.toLowerCase().includes(value) ||
        String(l.actor).includes(value) ||
        String(l.target).includes(value)
    );

    renderLogs(filtered);
}

/* ================= PAGINATION ================= */
function nextPage(){
    currentPage++;
    loadLogs();
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        loadLogs();
    }
}

/* ================= INIT ================= */
loadLogs();

</script>

</body>
</html>
