{% extends "base.html" %}

{% block title %}Edit Chamber{% endblock %}

{% block content %}

<style>

body{
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
    font-family:Inter;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h2{
    margin-bottom:20px;
    color:#0f172a;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #e2e8f0;
    outline:none;
}

textarea{
    min-height:100px;
}

label{
    font-size:13px;
    color:#64748b;
    margin-bottom:5px;
    display:block;
}

.btn{
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
    padding:10px 15px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    margin-top:15px;
}

.section-title{
    margin:20px 0 10px;
    color:#0f172a;
}

.file-box{
    padding:10px;
    border:1px dashed #cbd5e1;
    border-radius:10px;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>

<div class="container">

<div class="card">

    <h2>✏️ Edit Chamber</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="hidden"
            name="csrf_token"
            value="{{ csrf_token() }}">

        <!-- BASIC -->
        <div class="form-grid">

            <div>
                <label>Name</label>
                <input type="text" name="name" value="{{ chamber.name }}">
            </div>

            <div>
                <label>Phone</label>
                <input type="text" name="phone" value="{{ chamber.phone }}">
            </div>

            <div>
                <label>WhatsApp</label>
                <input type="text" name="whatsapp" value="{{ profile.whatsapp if profile else '' }}">
            </div>

            <div>
                <label>Email</label>
                <input type="text" name="email" value="{{ profile.email if profile else '' }}">
            </div>

            <div>
                <label>Website</label>
                <input type="text" name="website" value="{{ profile.website if profile else '' }}">
            </div>

            <div>
                <label>Area</label>
                <input type="text" name="area" value="{{ profile.area if profile else '' }}">
            </div>

        </div>

        <label>Address</label>
        <input type="text" name="address" value="{{ chamber.address }}">

        <label>Description</label>
        <textarea name="description">{{ profile.description if profile else '' }}</textarea>

        <!-- IMAGES -->
        <h3 class="section-title">Images</h3>

        <div class="form-grid">

            <div>
                <label>Profile Image</label>
                <div class="file-box">
                    <input type="file" name="profile_image">
                </div>
            </div>

            <div>
                <label>Cover Image</label>
                <div class="file-box">
                    <input type="file" name="cover_image">
                </div>
            </div>

            <div>
                <label>Logo</label>
                <div class="file-box">
                    <input type="file" name="logo">
                </div>
            </div>

        </div>

        <button class="btn">Update Chamber</button>

    </form>

</div>

</div>

{% endblock %}
