{% extends "base.html" %}

{% block content %}

<style>

/* ===================================================== */
/* BODY */
/* ===================================================== */

body{
    background:#020617;
}

/* ===================================================== */
/* MAIN WRAPPER */
/* ===================================================== */

.upload-wrapper{

    min-height:100vh;
}

/* ===================================================== */
/* GLASS CARD */
/* ===================================================== */

.upload-card{

    background:rgba(15,23,42,0.95);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:35px;

    overflow:hidden;

    box-shadow:
    0 15px 60px rgba(0,0,0,0.5);

    backdrop-filter:blur(12px);
}

/* ===================================================== */
/* HEADER */
/* ===================================================== */

.upload-header{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    padding:40px;

    position:relative;

    overflow:hidden;
}

.upload-header::before{

    content:"";

    position:absolute;

    width:350px;
    height:350px;

    background:rgba(255,255,255,0.08);

    border-radius:50%;

    top:-150px;
    right:-100px;
}

.upload-title{

    color:white;

    font-size:34px;

    font-weight:800;
}

.upload-subtitle{

    color:rgba(255,255,255,0.8);

    font-size:15px;
}

/* ===================================================== */
/* BADGE */
/* ===================================================== */

.live-badge{

    background:#22c55e;

    color:white;

    padding:12px 20px;

    border-radius:50px;

    font-weight:700;

    box-shadow:
    0 5px 20px rgba(34,197,94,0.3);
}

/* ===================================================== */
/* FORM */
/* ===================================================== */

.upload-body{

    padding:40px;
}

.section-title{

    color:white;

    font-size:22px;

    font-weight:700;

    margin-bottom:25px;
}

/* ===================================================== */
/* INPUTS */
/* ===================================================== */

.form-label{

    color:#e2e8f0;

    font-weight:600;

    margin-bottom:10px;
}

.form-control,
.form-select{

    background:#0f172a !important;

    border:1px solid rgba(255,255,255,0.08) !important;

    color:white !important;

    min-height:58px;

    border-radius:18px !important;

    padding-left:18px;
}

textarea.form-control{

    min-height:140px;
}

.form-control::placeholder{

    color:#94a3b8;
}

.form-control:focus,
.form-select:focus{

    border-color:#2563eb !important;

    box-shadow:
    0 0 0 4px rgba(37,99,235,0.15) !important;
}

/* ===================================================== */
/* SWITCH BOX */
/* ===================================================== */

.switch-card{

    background:#0f172a;

    border-radius:22px;

    padding:18px;

    border:1px solid rgba(255,255,255,0.05);

    height:100%;

    transition:0.3s;
}

.switch-card:hover{

    transform:translateY(-4px);

    border-color:#2563eb;
}

.form-check-input{

    width:55px;
    height:28px;

    cursor:pointer;
}

.form-check-label{

    color:white;

    font-weight:600;

    margin-left:10px;
}

/* ===================================================== */
/* BUTTONS */
/* ===================================================== */

.upload-btn{

    height:60px;

    border:none;

    border-radius:18px;

    padding:0 30px;

    font-weight:700;

    font-size:16px;

    transition:0.3s;
}

.btn-upload{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;
}

.btn-upload:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 25px rgba(37,99,235,0.4);
}

.btn-back{

    background:#111827;

    color:white;
}

.btn-back:hover{

    background:#1e293b;
}

/* ===================================================== */
/* INFO BOX */
/* ===================================================== */

.info-box{

    background:#111827;

    border-radius:25px;

    padding:25px;

    color:white;

    border:1px solid rgba(255,255,255,0.05);
}

.info-item{

    display:flex;

    align-items:center;

    gap:12px;

    margin-bottom:15px;
}

.info-icon{

    width:45px;
    height:45px;

    border-radius:14px;

    background:#2563eb;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===================================================== */
/* MOBILE */
/* ===================================================== */

@media(max-width:768px){

    .upload-header{
        padding:30px 25px;
    }

    .upload-title{
        font-size:26px;
    }

    .upload-body{
        padding:25px;
    }

}

</style>

<div class="container-fluid py-4 upload-wrapper">

    <div class="row justify-content-center">

        <div class="col-xl-11">

            <div class="upload-card">

                <!-- ===================================================== -->
                <!-- HEADER -->
                <!-- ===================================================== -->

                <div class="upload-header">

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

                        <div>

                            <h1 class="upload-title">
                                📺 Live Media Upload Center
                            </h1>

                            <p class="upload-subtitle mb-0">

                                Upload videos, banners, audio streams, popup ads & live TV media

                            </p>

                        </div>

                        <div class="live-badge">

                            🟢 Production Ready

                        </div>

                    </div>

                </div>

                <!-- ===================================================== -->
                <!-- BODY -->
                <!-- ===================================================== -->

                <div class="upload-body">

                    <form method="POST"
                          action="/live/create"
                          enctype="multipart/form-data">

                        <input type="hidden"
                            name="csrf_token"
                            value="{{ csrf_token() }}">

                        <div class="row g-4">

                            <!-- LEFT -->

                            <div class="col-lg-8">

                                <!-- BASIC -->

                                <div class="mb-5">

                                    <h4 class="section-title">

                                        🎬 Media Information

                                    </h4>

                                    <div class="row g-4">

                                        <div class="col-md-6">

                                            <label class="form-label">

                                                Media Title

                                            </label>

                                            <input type="text"
                                                   class="form-control"
                                                   name="title"
                                                   placeholder="Enter media title"
                                                   required>

                                        </div>

                                        <div class="col-md-6">

                                            <label class="form-label">

                                                Category

                                            </label>

                                            <input type="text"
                                                   class="form-control"
                                                   name="category"
                                                   placeholder="News / Ads / Live">

                                        </div>

                                        <div class="col-12">

                                            <label class="form-label">

                                                Description

                                            </label>

                                            <textarea class="form-control"
                                                      name="description"
                                                      placeholder="Write media details..."></textarea>

                                        </div>

                                        <div class="col-md-4">

                                            <label class="form-label">

                                                Media Type

                                            </label>

                                            <select class="form-select"
                                                    name="media_type">

                                                <option value="video">
                                                    🎬 Video
                                                </option>

                                                <option value="banner">
                                                    🖼 Banner
                                                </option>

                                                <option value="audio">
                                                    🎵 Audio
                                                </option>

                                                <option value="popup">
                                                    📢 Popup
                                                </option>

                                                <option value="live_tv">
                                                    📺 Live TV
                                                </option>

                                            </select>

                                        </div>

                                        <div class="col-md-4">

                                            <label class="form-label">

                                                Upload File

                                            </label>

                                            <input type="file"
                                                   class="form-control"
                                                   name="file"
                                                   required>

                                        </div>

                                        <div class="col-md-4">

                                            <label class="form-label">

                                                Thumbnail

                                            </label>

                                            <input type="file"
                                                   class="form-control"
                                                   name="thumbnail">

                                        </div>

                                        <div class="col-12">

                                            <label class="form-label">

                                                Stream URL

                                            </label>

                                            <input type="text"
                                                   class="form-control"
                                                   name="stream_url"
                                                   placeholder="https://youtube.com/live/...">

                                        </div>

                                    </div>

                                </div>

                                <!-- PLAYER -->

                                <div class="mb-5">

                                    <h4 class="section-title">

                                        📐 Player Settings

                                    </h4>

                                    <div class="row g-4">

                                        <div class="col-md-6">

                                            <label class="form-label">

                                                Player Width

                                            </label>

                                            <input type="number"
                                                   class="form-control"
                                                   name="default_width"
                                                   value="420">

                                        </div>

                                        <div class="col-md-6">

                                            <label class="form-label">

                                                Player Height

                                            </label>

                                            <input type="number"
                                                   class="form-control"
                                                   name="default_height"
                                                   value="240">

                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- RIGHT -->

                            <div class="col-lg-4">

                                <!-- DISPLAY CONTROLS -->

                                <div class="info-box mb-4">

                                    <h4 class="section-title mb-4">

                                        ⚙ Display Controls

                                    </h4>

                                    <div class="row g-3">

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="force_show">

                                                    <label class="form-check-label">

                                                        Force Show

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="auto_play">

                                                    <label class="form-check-label">

                                                        Auto Play

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="floating_mode"
                                                           checked>

                                                    <label class="form-check-label">

                                                        Floating Mode

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="show_popup">

                                                    <label class="form-check-label">

                                                        Popup Mode

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="allow_fullscreen"
                                                           checked>

                                                    <label class="form-check-label">

                                                        Fullscreen

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="allow_resize"
                                                           checked>

                                                    <label class="form-check-label">

                                                        Resize

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="allow_drag"
                                                           checked>

                                                    <label class="form-check-label">

                                                        Drag Move

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                        <div class="col-12">

                                            <div class="switch-card">

                                                <div class="form-check form-switch">

                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           name="allow_minimize"
                                                           checked>

                                                    <label class="form-check-label">

                                                        Minimize

                                                    </label>

                                                </div>

                                            </div>

                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- BUTTONS -->

                        <div class="d-flex gap-3 flex-wrap mt-4">

                            <button type="submit"
                                    class="upload-btn btn-upload">

                                🚀 Upload Media

                            </button>

                            <a href="/live"
                               class="upload-btn btn-back text-decoration-none d-flex align-items-center justify-content-center">

                                ← Back Dashboard

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
