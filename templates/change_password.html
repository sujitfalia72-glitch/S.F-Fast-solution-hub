{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4">
            🔒 Change Password
        </h3>

        <form method="POST">

            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            <div class="mb-3">

                <label class="form-label">
                    New Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    name="password"
                    required
                >

            </div>

            <button
                class="btn btn-primary w-100"
                type="submit"
            >
                Update Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
